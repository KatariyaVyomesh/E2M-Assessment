<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliHire Pro | AI Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #161b22;
            --accent: #38bdf8;
            --accent-purple: #a855f7;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --border: #30363d;
            --transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            width: 100%;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
            color: #fff;
        }

        header p {
            color: var(--text-dim);
            margin: 10px 0 0;
            font-size: 0.95rem;
        }

        /* Home Layout: Centered Input Card */
        .home-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 600px;
            /* Centered narrow card */
            margin-top: 20px;
        }

        /* Sidebar-style card adapted for home */
        .input-card {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .input-group label i {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            height: 160px;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .analysis-type-container {
            margin-top: 5px;
        }

        .analysis-type-container label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-family: inherit;
            cursor: pointer;
        }

        .analyze-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 50px;
            padding: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: var(--transition);
        }

        .analyze-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.02);
        }

        .watermark {
            margin-top: 20px;
            text-align: center;
            font-size: 3.5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            letter-spacing: -2px;
            line-height: 1;
            user-select: none;
        }

        /* Loader Overlay */
        #loader {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 17, 23, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            color: var(--accent);
            font-weight: 700;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-banner {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            width: 100%;
        }
    </style>
</head>

<body>

    <header>
        <h1>IntelliHire Pro</h1>
        <p>Enterprise-grade resume analysis powered by AI Intelligence</p>
    </header>

    <div class="home-container">
        <!-- Main: Input Section -->
        <div class="input-card">
            {% if error %}
            <div class="error-banner">
                <i class="fa-solid fa-circle-xmark" style="margin-right: 10px;"></i>
                <strong>Error:</strong> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/predict/" id="mainForm" autocomplete="off">
                {% csrf_token %}
                <div class="input-group">
                    <label><i class="fa-solid fa-file-lines"></i> Candidate Resume</label>
                    <textarea name="resume_text" placeholder="Paste the raw resume text here..." required
                        autocomplete="off">{{ resume_text }}</textarea>
                </div>

                <div class="input-group" style="margin-top: 20px;">
                    <label><i class="fa-solid fa-briefcase"></i> Job Profile</label>
                    <textarea name="job_description"
                        placeholder="Paste the job description for automated matching & gap analysis..." required
                        autocomplete="off">{{ job_description }}</textarea>
                </div>

                <div class="analysis-type-container">
                    <label>Analysis Type</label>
                    <select name="analysis_type">
                        <option value="deep">Full Deep Dive</option>
                        <option value="quick">Quick Skills Match</option>
                        <option value="executive">Executive Summary</option>
                    </select>
                </div>

                <button type="submit" class="analyze-btn" style="width: 100%; margin-top: 25px;">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Get Analysis Report
                </button>
            </form>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <p>Running Intelligence Analysis...</p>
    </div>

    <script>
        const form = document.getElementById('mainForm');
        const loader = document.getElementById('loader');

        if (form) {
            form.addEventListener('submit', () => {
                loader.style.display = 'flex';
            });
        }

        // Professional Clean-Slate: Runs once on load/back 
        // without aggressive loops that interfere with submissions.
        const cleanSlate = () => {
            const hasError = document.querySelector('.error-banner');
            if (!hasError) {
                document.querySelectorAll('textarea').forEach(t => t.value = '');
                if (form) form.reset();
            }
        };

        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                 if (loader) loader.style.display = 'none';
                 cleanSlate();
            }
        });

        // Run once on load
        cleanSlate();

        // Show pop-up alert if error exists
        window.addEventListener('DOMContentLoaded', () => {
            const errorBanner = document.querySelector('.error-banner');
            if (errorBanner) {
                const errorMsg = errorBanner.innerText.replace('Error:', '').replace('×', '').trim();
                // Simple pop-up as requested
                alert("Validation Error:\n\n" + errorMsg);
            }
        });
    </script>
</body>

</html>
